<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Can Draw... — Drawing Challenge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #faf2e6; color: #2d3859; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px 24px; max-width: 400px; }
        .icon { width: 100px; height: 100px; background: #e8eaf6; border-radius: 24px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 16px; margin-bottom: 32px; }
        .message { font-size: 18px; margin-bottom: 12px; font-weight: 600; }
        .description { color: #666; font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
        .btn { display: inline-block; background: #3868eb; color: white; text-decoration: none; padding: 14px 36px; border-radius: 14px; font-size: 17px; font-weight: 600; }
        .btn:hover { background: #2a52c9; }
        .secondary { display: block; margin-top: 16px; color: #888; font-size: 13px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✏️</div>
        <h1>I Can Draw...</h1>
        <p class="subtitle">Someone challenged you to draw!</p>
        <p class="description">A friend sent you a drawing challenge. Download I Can Draw... to see the prompt, draw your version, and reveal both drawings side by side.</p>
        <a class="btn" href="https://apps.apple.com/app/i-can-draw/id000000000">Download on the App Store</a>
        <a class="secondary" href="/">Learn more about I Can Draw...</a>
    </div>

    <script>
        // Try to open the app first via custom URL scheme
        const path = window.location.pathname;
        const token = path.split('/invite/')[1];
        if (token) {
            // Try universal link first (handled by iOS automatically)
            // If user is on iOS without the app, they'll see this page
            // If they have the app, iOS intercepts before this page loads

            // Also try the custom scheme as fallback
            setTimeout(function() {
                window.location.href = 'icandraw://invite?t=' + token;
            }, 100);
        }
    </script>
</body>
</html>
